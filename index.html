<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Documenten</title>
  <style>
    :root { --bg:#f6f7fb; --card:#fff; --text:#182230; --muted:#667085; --line:#e4e7ec; --brand:#155eef; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); }
    header { background:linear-gradient(135deg,#0b2b6b,#155eef); color:white; padding:38px 22px; }
    .wrap { max-width:1050px; margin:0 auto; }
    h1 { margin:0 0 8px; font-size:34px; }
    header p { margin:0; opacity:.9; font-size:16px; }
    main { padding:28px 22px 50px; }
    .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:18px; }
    input { width:100%; padding:14px 16px; border:1px solid var(--line); border-radius:12px; font-size:16px; background:white; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; box-shadow:0 2px 8px rgba(16,24,40,.04); text-decoration:none; color:inherit; transition:.15s ease; }
    .card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(16,24,40,.10); border-color:#b2ccff; }
    .icon { font-size:34px; margin-bottom:14px; }
    .title { font-weight:700; font-size:17px; line-height:1.3; margin-bottom:8px; word-break:break-word; }
    .meta { color:var(--muted); font-size:14px; }
    .empty { background:white; border:1px dashed var(--line); border-radius:16px; padding:24px; color:var(--muted); }
    footer { color:var(--muted); font-size:13px; padding-top:24px; }
    .btn { display:inline-block; margin-top:12px; padding:10px 12px; background:#eff4ff; color:#155eef; border-radius:10px; font-weight:700; font-size:14px; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Documenten</h1>
      <p>Bekijk en deel documenten rechtstreeks in de browser, zonder Dropbox-header.</p>
    </div>
  </header>
  <main class="wrap">
    <div class="toolbar"><input id="search" placeholder="Zoek een document..."></div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none">Geen PDF-documenten gevonden. Upload PDF's in de map <strong>docs</strong>.</div>
    <footer>Nieuwe PDF toevoegen? Upload het bestand in de map <strong>docs</strong> en klik op <strong>Commit changes</strong>.</footer>
  </main>
  <script>
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const search = document.getElementById('search');
    let documents = [];

    function niceName(filename) {
      return filename.replace(/\.pdf$/i, '').replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim().replace(/\b\w/g, c => c.toUpperCase());
    }
    function currentRepo() {
      const parts = location.pathname.split('/').filter(Boolean);
      const owner = location.hostname.split('.')[0];
      const repo = parts[0] || 'documenten';
      return { owner, repo };
    }
    async function loadDocs() {
      const { owner, repo } = currentRepo();
      const api = `https://api.github.com/repos/${owner}/${repo}/contents/docs`;
      try {
        const res = await fetch(api);
        if (!res.ok) throw new Error('Geen docs-map gevonden');
        const files = await res.json();
        documents = files.filter(f => f.type === 'file' && f.name.toLowerCase().endsWith('.pdf'))
          .map(f => ({ name:f.name, title:niceName(f.name), url:`docs/${encodeURIComponent(f.name)}` }));
      } catch (e) {
        documents = [
          { name:'gewestplan-legende.pdf', title:'Gewestplan Legende', url:'docs/gewestplan-legende.pdf' }
        ];
      }
      render();
    }
    function render() {
      const q = search.value.toLowerCase();
      const list = documents.filter(d => d.title.toLowerCase().includes(q) || d.name.toLowerCase().includes(q));
      grid.innerHTML = list.map(d => `
        <a class="card" href="viewer.html?file=${encodeURIComponent(d.url)}&title=${encodeURIComponent(d.title)}">
          <div class="icon">📄</div>
          <div class="title">${d.title}</div>
          <div class="meta">PDF-document</div>
          <span class="btn">Openen</span>
        </a>`).join('');
      empty.style.display = list.length ? 'none' : 'block';
    }
    search.addEventListener('input', render);
    loadDocs();
  </script>
</body>
</html>
