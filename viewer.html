<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document bekijken</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }
    iframe {
      display: block;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <iframe id="frame" title="Document"></iframe>
  <script>
    const p = new URLSearchParams(location.search);
    const file = p.get('file') || 'docs/gewestplan-legende.pdf';
    const title = p.get('title') || 'Document';
    document.title = title;

    // De parameters na # verbergen in de meeste browsers de PDF-werkbalk,
    // paginabalk links, download/printknoppen en scrollbars.
    const cleanFile = file.split('#')[0];
    document.getElementById('frame').src = cleanFile + '#toolbar=0&navpanes=0&scrollbar=0&view=FitH';
  </script>
</body>
</html>
