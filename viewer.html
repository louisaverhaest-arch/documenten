<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document bekijken</title>
  <style>
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:#111827; color:white; }
    .bar { height:62px; display:flex; align-items:center; gap:14px; padding:0 18px; background:#0b1220; border-bottom:1px solid rgba(255,255,255,.12); }
    a { color:white; text-decoration:none; }
    .back { padding:9px 12px; background:rgba(255,255,255,.1); border-radius:10px; }
    .title { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    iframe { width:100%; height:calc(100vh - 62px); border:0; background:white; }
  </style>
</head>
<body>
  <div class="bar">
    <a class="back" href="index.html">← Terug</a>
    <div id="title" class="title">Document</div>
  </div>
  <iframe id="frame"></iframe>
  <script>
    const p = new URLSearchParams(location.search);
    const file = p.get('file') || 'docs/gewestplan-legende.pdf';
    const title = p.get('title') || 'Document';
    document.getElementById('title').textContent = title;
    document.title = title;
    document.getElementById('frame').src = file;
  </script>
</body>
</html>
